<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Arcade — Asocijacije theme reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #07041A; color: #fff; font-family: 'Hanken Grotesk', sans-serif; }
  * { box-sizing: border-box; }
  .head { padding: 48px 40px 8px; }
  .head h1 { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 34px; margin: 0; letter-spacing: -0.5px; }
  .head h1 span { color: #FC7753; }
  .head p { color: #A99FD6; font-size: 15px; max-width: 620px; line-height: 1.6; margin: 12px 0 0; }
  .rail { display: flex; gap: 40px; padding: 36px 40px 64px; overflow-x: auto; align-items: flex-start; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 14px; flex-shrink: 0; }
  .cap { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: #8B7BE8; }
  .frame { border-radius: 44px; box-shadow: 0 30px 70px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="head">
  <h1>Neon Arcade<span>.</span></h1>
  <p>Theme reference for <strong>Asocijacije</strong> — loud game-show energy: ember orange, magenta &amp; cyan on deep indigo, chunky tactile buttons with hard lips and outer glow. The four core screens are rendered below at their true 320×690 mobile size.</p>
</div>
<div id="root" class="rail"></div>
<script type="text/babel" src="source/shared.jsx"></script>
<script type="text/babel" src="source/directionA.jsx"></script>
<script type="text/babel">
const cells = [["Home", AHome], ["Game setup", ASetup], ["In-round play", APlay], ["Scoreboard", AScore]];
function Ref() {
  return (
    <>
      {cells.map(([label, C]) => (
        <div className="cell" key={label}>
          <div className="frame"><C /></div>
          <div className="cap">{label}</div>
        </div>
      ))}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Ref />);
</script>
</body>
</html>
